<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form in css</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="perantdiv">
    <div id="blue-container">
        <div id="heagin-login">
                <h1>Login</h1>
            </div>
        <div id="inputs">
            
            <div id="inputs-email-password">
                <div><input type="email" name="email" id="email" placeholder="Enter you email"></div>
                <div><input type="password" name="password" id="password" placeholder="Confirm a password"></div>
            </div>
        </div>
        <div id="chackbox-forgotPassword">
            <div>
                <input type="checkbox" name="chackbox" id="chackbox">
            </div>
            <div>
                <a href="#">Forgot password?</a>
            </div>
        </div>
        <div id="login-button">
            <button>Login Now</button>
        </div>
    </div>
    </div>
  </body>
</html>
