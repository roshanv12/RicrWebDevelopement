<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amimation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100%;
        background-color: #0a0a0a;
        display: flex;
        justify-content: center;
      }

      .container {
        width: 80%;
        color: white;
        background-color: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.071);
        border-radius: 5px;
        font-size: 40px;
        padding: 10px;
        font-family: cursive;
        white-space: nowrap;
        overflow: hidden;
      }

      .para {
        animation-name: headingAnimation;
        animation-duration: 10s;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
      }
      @keyframes headingAnimation {
        from {
          margin-left: 100%;
        }
        to {
          margin-left: -100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="para">Roshan Vishwakrma, I am software Engineering student</p>
    </div>
  </body>
</html>
