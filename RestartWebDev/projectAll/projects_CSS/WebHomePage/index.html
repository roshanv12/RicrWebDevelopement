<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        background-image: url("Full-hd-nature-wallpapers-1080p.jpg");
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
      }
      .mainContainer {
        /* padding: 30px; */
        padding: 15px;

        margin: 0 auto;
        display: flex;
        text-align: center;
        align-items: center;
        justify-content: space-evenly;
      }
      .logoBox img {
        max-width: 130px;
        color: white;
      }
      a {
        text-decoration: none;
        padding: 5px;
        border-radius: 5px;
        color: chocolate;
        font-size: 1.3rem;
      }
      .anchor-links-box a:hover {
        box-shadow: 0px 0px 2px red;
      }

      .anchor-links-box {
        max-width: 100%;

        display: flex;
        gap: 30px;
        justify-content: space-around;
      }
      @media (max-width: 600px) {
        .anchor-links-box {
          display: flex;
          flex-direction: column;
          gap: 0;
          display: none;
        }
      }

      .nabButtonBox {
        padding: 10px 20px;
        border-radius: 5px;
        background-color: rgba(0, 0, 0, 0.596);
        color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;
      }
      .nabButtonBox:hover {
        background-color: rgba(0, 0, 0, 0.412);
      }
      @media (max-width: 600px) {
        .anchor-links-box {
          display: flex;
          flex-direction: column;
          gap: 0;
          display: none;
        }
        .nabButtonBox {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="mainContainer">
      <a href="#Logo" class="logoBox">
        <img src="RICRlogo.png " alt="logo" />
      </a>
      <div class="anchor-links-box">
        <a href="#Home">Home</a>
        <a href="#About">About</a>
        <a href="#Service">Service</a>
        <a href="#Contact">Contact</a>
        <a href="#Design">Design</a>
      </div>
      <div class="nabButtonBox">
        <a href="/loginForm/index.html"> Login Now </a>
      </div>
    </div>
  </body>
</html>
