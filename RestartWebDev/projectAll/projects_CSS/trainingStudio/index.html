<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Training Studio</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- <link rel="stylesheet" href="style.css" /> -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        color: white;
      }

      .main-header-container {
        margin: 0 auto;
        background-image: url("./img/amazone.jpg");
        max-width: 100%;
        height: 100vh;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .header-content {
        display: flex;
        /* flex-wrap: wrap; */
        justify-content: space-between;
        align-items: center;
        padding: 0.9rem 1rem;
        background-color: rgba(128, 128, 128, 0.422);
      }

      .logo-header {
        text-decoration: none;
        font-size: 1.2rem;
        font-weight: 800;
      }
      .logo-header span {
        color: orangered;
      }

      .links-header {
        text-decoration: none;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1.6rem;
      }

      .link {
        display: flex;
        gap: 1.2rem;
      }

      .header-link-anchor {
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        transition: all 0.3s ease;
      }

      .header-link-anchor:hover {
        color: orangered;
      }

      .header-button {
        /* border: 1px solid white;
  padding: 0.5rem 0.9rem;
  background-color: orangered; */
      }

      .signup-button {
        padding: 0.7rem 0.9rem;
        background-color: orangered;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        transition: all 0.6s ease;
      }
      .signup-button:hover {
        background-color: orange;
      }

      /* hero-section */

      .hero-content {
       height: calc(100vh - 70px);
        display: flex;
        gap: 1rem;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .hero-para {
        font-size: smaller;
        font-weight: 500;
      }

      .hero-heading {
        font-size: 3rem;
        font-weight: 800;
      }

      .hero-heading-span {
        color: orangered;
      }

      .hero-anchor-button {
        font-size: smaller;
        padding: 0.7rem 0.9rem;
        background-color: orangered;
        text-decoration: none;
        /* font-size: 0.9rem; */
        font-weight: 500;
        transition: all 0.6s ease;
      }

      .header-hember-icon {
        display: none;
      }

      @media (max-width: 650px) {
        .links-header {
          display: none;
        }

        .header-hember-icon {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div class="main-header-container">
      <!-- header-section -->

      <header class="header-content">
        <a class="logo-header" href="logo">
          TAINING <span class="span-logo">DTUDIO</span>
        </a>

        <div class="links-header">
          <div class="link">
            <a href="#home" class="header-link-anchor">HOME</a>
            <a href="#about" class="header-link-anchor">ABOUT</a>
            <a href="#classes" class="header-link-anchor">CLASSES</a>
            <a href="#schedule" class="header-link-anchor">SCHEDULE</a>
            <a href="#contact" class="header-link-anchor">CONTACT</a>
          </div>

          <div class="header-button">
            <a href="BTN#" class="signup-button">SIGNUP</a>
          </div>
        </div>

        <div class="header-hember-icon">
          <i class="fa-solid fa-bars-staggered"></i>
        </div>
      </header>

      <!-- heto-section -->

      <div class="hero-content">
        <div class="hero-para">WORK HARDER, GET STRONGER</div>

        <div class="hero-heading">
          EASY WITH OUR <span class="hero-heading-span">GYM</span>
        </div>

        <div class="hero-button">
          <a href="#hero-button" class="hero-anchor-button">BECOME A MEMBER</a>
        </div>
      </div>
    </div>
  </body>
</html>
