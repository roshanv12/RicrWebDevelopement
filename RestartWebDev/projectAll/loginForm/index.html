<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .mainContainer {
        max-width: 350px;
        width: 100%;
        min-height: 350px;
        background-color: white;
        border-radius: 20px;
        box-shadow: 0px 0px 20px 0px black;
        margin: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: start;
        gap: 20px;
      }

      span {
        border-bottom: 5px blue solid;
        border-radius: 5px;
      }
      .userinput {
        display: flex;
        flex-direction: column;

        gap: 20px;
        input {
          font-size: large;
          /* margin: 5px; */
          outline: none;
          padding: 5px;
          border: none;
          border-bottom: 2px solid gray;
        }
      }

      #chackboxContainer {
        display: flex;
        width: 100%;

        justify-content: space-between;
        margin-top: 15px;
      }
      button {
        width: 100%;
        height: 35px;
        margin-top: 20px;
        margin-bottom: 20px;
        font-size: large;
        border: none;
        border-radius: 10px;
        box-shadow: 1px 1px 5px 1px gray;
        background-color: blue;
        color: whitesmoke;
        font-weight: 600;
      }
      button:hover {
        background-color: white;
        color: blue;
      }
      #paraDiv {
        display: flex;
        justify-content: center;
      }
      a {
        color: blue;
      }
    </style>
  </head>
  <body>
    <div class="mainContainer">
      <h1><span>Lo</span>gin</h1>
      <div class="inputContainer">
        <div>
          <div class="userinput">
            <div>
              <input
                type="email"
                name="userEmail"
                id="userEmail"
                placeholder="Enter your email"
              />
            </div>
            <div>
              <input
                type="password"
                name="userPassword"
                id="userPassword"
                placeholder="Enter your password"
              />
            </div>
          </div>
          <div id="chackboxContainer">
            <div>
              <input type="checkbox" name="checkbox" id="checkbox" />
              <label for="checkbox">Remember me</label>
            </div>
            <div>
              <a href="#">Forgot password?</a>
            </div>
          </div>
          <div>
            <button>Login Now</button>
          </div>
          <div id="paraDiv">
            <p>Don't have an account?<a href="#">Signup now</a></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
