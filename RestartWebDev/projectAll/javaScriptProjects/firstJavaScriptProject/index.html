<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First JavaScript Project</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <h1 class="title">Focus on <span class="span-heading">Today</span></h1>
      <div class="app-container">
        <div class="subtitle-container">
          <h2 class="subTitle">Today</h2>
          <img src="./sun-img-web.png" alt="img" class="subTitle-img" />
        </div>
        <p class="progress-lebel">Raise the bar by completing your goals!</p>
        <div class="progress-ber">
          <div class="progress-value">roshan</div>
        </div>

        <p class="error">Please set all the 3 goals!</p>

        <div class="goal-container">
          <div class="custom-checkBox">
            <i class="fa-solid fa-circle-check "></i>
          </div>
          <input
            type="text"
            class="goal-input "
            placeholder="Add new goal..."
          />
        </div>

        <div class="goal-container">
          <div class="custom-checkBox">
            <i class="fa-solid fa-circle-check "></i>
          </div>
          <input
            type="text"
            class="goal-input "
            placeholder="Add new goal..."
          />
        </div>

        <div class="goal-container">
          <div class="custom-checkBox">
            <i class="fa-solid fa-circle-check "></i>
          </div>
          <input
            type="text"
            class="goal-input "
            placeholder="Add new goal..."
          />
        </div>

        <p class="quote">“Move one step ahead, today!”</p>

        <p class="made-width">Made with ❤️ by Roshan Vishwakarma</p>
      </div>
    </main>
  </body>
</html>
