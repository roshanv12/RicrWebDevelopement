<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: blue;
        font-family: Arial, Helvetica, sans-serif;
        min-height: 100vh;
        height: 90%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .mainWhiteContainer {
        max-width: 400px;
        width: 90%;
        min-height: fit-content;
        margin: 0 auto;
        padding: 20px;

        background-color: white;
        border-radius: 15px;
        box-shadow: 0px 0px 30px 0px black;

        display: flex;
        flex-direction: column;
      }
      /* Mobile first approch */

      @media (min-width: 600px) and (max-width: 900px) {
        .mainWhiteContainer {
          max-width: 400px;
          width: 90%;
          min-height: fit-content;
          margin: 0 auto;
          padding: 15px;
        }
      }
      @media (min-width: 1200px) {
        .mainWhiteContainer {
          max-width: 450px;
          width: 90%;
          min-height: fit-content;
          margin: 0 auto;
          padding: 20px;
        }
      }

      .heading h1 {
        max-width: 100%;
        margin: 10px 0px 10px 0px;
      }

      .mainUserInputContainer {
        max-width: 100%;
        min-height: fit-content;
        display: flex;
        flex-direction: column;
      }

      .userNameBox {
        max-width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
        font-size: large;
        display: flex;
        justify-content: center;
        align-items: center;
        outline: none;
        color: gray;
        margin-bottom: 15px;
        border-bottom: 2px solid gray;
      }
      .userNameBox:hover {
        border-bottom: 2px solid black;
      }
      input {
        width: 100%;
        margin: 5px;
        border: none;
        outline: none;
        font-size: large;
      }

      input:not([type="checkbox"]) {
        width: 100%;
        margin: 5px;
        border: none;
        outline: none;
        font-size: large;
      }
      .checkboxDiv input[type="checkbox"] {
        width: auto;
        margin: 0;
      }
      .checkboxDiv {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .buttonbox {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
      }

      .buttonbox button {
        width: 95%;
        padding: 10px;
        margin-top: 20px;
        background-color: blue;
        border-radius: 20px;
        color: white;
        font-size: medium;
        font-weight: 500;
        border: solid gray 1px;
      }
      button:hover {
        background-color: white;
        color: blue;
      }
    </style>
  </head>
  <body>
    <div class="mainWhiteContainer">
      <div class="heading">
        <h1>Registration</h1>
      </div>

      <div class="mainUserInputContainer">
        <div class="mainUserInput">
          <div class="userNameBox">
            <i class="fa-regular fa-user"></i>
            <input
              type="text"
              name="userName"
              id="userName"
              placeholder="Enter your name"
            />
          </div>
          <div class="userNameBox">
            <i class="fa-regular fa-envelope"></i>
            <input
              type="email"
              name="userEmail"
              id="userEmail"
              placeholder="Enter your email"
            />
          </div>
          <div class="userNameBox">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              name="userPassword"
              id="userPassword"
              placeholder="Create a password"
            />
          </div>
          <div class="userNameBox">
            <i class="fa-solid fa-lock"></i>
            <input
              type="password"
              name="confirmPassword"
              id="confirmPassword"
              placeholder="Confirm a password"
            />
          </div>
        </div>

        <div class="checkboxDiv">
          <input type="checkbox" name="checkbox" id="checkbox" />
          <label for="checkbox"> accept all terms & conditions</label>
        </div>

        <div class="buttonbox">
          <button>Register Now</button>
          <p>Already have account?<a href="#">Login now</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
