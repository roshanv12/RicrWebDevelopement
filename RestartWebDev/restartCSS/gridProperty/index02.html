<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Layout</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      h1 {
        margin: 50px;
        
      }
      .container {
        width: 100%;
        max-width: 850px;
        min-height: 600px;
        border: solid black 2px;
        font-size: 30px;
        margin-bottom: 20px;

        display: grid;
        gap: 10px;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
      }
      .box {
        background-color: blue;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .Header {
        grid-column-start: 1;
        grid-column-end: 4;
      }

      .Sidebar {
        grid-row: span 2;
      }
      .Content1 {
        grid-column: span 2;
      }
      .Footer {
        grid-column: span 3;
      }
    </style>
  </head>
  <body>
    <h1>Grid Layout</h1>
    <div class="container">
      <div class="box Header">Header</div>
      <div class="box Sidebar">SideBar</div>
      <div class="box Content1">Content1</div>
      <div class="box Content2">conttent2</div>
      <div class="box Content3">Content3</div>
      <div class="box Footer">Footer</div>
    </div>
  </body>
</html>
