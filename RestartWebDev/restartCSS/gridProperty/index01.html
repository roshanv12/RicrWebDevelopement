<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Project Grid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: beige;
      }

      .Main-container {
        width: 650px;
        height: 650px;

        box-shadow: 0px 0px 20px 5px brown;

        display: grid;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
      }

      .whiteBox {
        font-size: 30px;
        background-color: whitesmoke;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
      }
      .whiteBox:hover {
        color: white;
        background-color: black;
        opacity: 0.5;
      }
      .blackBox {
        color: white;
        font-size: 30px;
        background-color: brown;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.3s;
      }
      .blackBox:hover {
        color: white;
        background-color: black;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="Main-container">
      <div class="whiteBox">1</div>
      <div class="blackBox">2</div>
      <div class="whiteBox">3</div>
      <div class="blackBox">4</div>
      <div class="whiteBox">5</div>
      <div class="blackBox">6</div>
      <div class="whiteBox">7</div>
      <div class="blackBox">8</div>
      <div class="blackBox">9</div>
      <div class="whiteBox">10</div>
      <div class="blackBox">11</div>
      <div class="whiteBox">12</div>
      <div class="blackBox">13</div>
      <div class="whiteBox">14</div>
      <div class="blackBox">15</div>
      <div class="whiteBox">16</div>
      <div class="whiteBox">17</div>
      <div class="blackBox">18</div>
      <div class="whiteBox">19</div>
      <div class="blackBox">20</div>
      <div class="whiteBox">21</div>
      <div class="blackBox">22</div>
      <div class="whiteBox">23</div>
      <div class="blackBox">24</div>
      <div class="blackBox">25</div>
      <div class="whiteBox">26</div>
      <div class="blackBox">27</div>
      <div class="whiteBox">28</div>
      <div class="blackBox">29</div>
      <div class="whiteBox">30</div>
      <div class="blackBox">31</div>
      <div class="whiteBox">32</div>
      <div class="whiteBox">33</div>
      <div class="blackBox">34</div>

</html>
