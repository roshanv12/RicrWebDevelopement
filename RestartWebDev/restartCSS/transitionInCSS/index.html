<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trasition</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      .container {
        width: 100%;
        max-width: 100vw;
        min-height: 100vh;
        background-color: cornflowerblue;
        padding: 20px;

        display: flex;
        gap: 50px;
      }
      .circleBox {
        width: 100px;
        height: 100px;
        border: 5px solid #0a0a0a;
        border-bottom-color: white;
        border-radius: 50%;

        animation: loadingCircle 2s linear infinite;
      }

      .box {
        width: 250px;
        height: 100px;
        border: 2px solid #0a0a0a;
        border-radius: 10px;
        background-color: gray;
        font-family: cursive;
        font-size: 2rem;
        color: black;

        display: flex;
        align-items: center;
        justify-content: center;

        /* transition-property: all;
        transition-duration: 2s;
        transition-delay: 1; */
        transition: all 2s linear 1s;
      }
      @keyframes loadingCircle {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .box:hover {
        background-color: white;
        transform: rotate(180deg);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="circleBox"></div>
      <div class="box">Roshan</div>
    </div>
  </body>
</html>
